<!DOCTYPE html>

<title>TradeFlow TH — Thai Commodity Trading</title>

<style>

  .mono { font-family: 'IBM Plex Mono', monospace; }
  .sidebar { width: 240px; min-width: 240px; background: #0D0D0F; height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 100; transition: width 0.3s ease; }

  .sidebar.collapsed .nav-label, .sidebar.collapsed .logo-text, .sidebar.collapsed .user-info, .sidebar.collapsed .kyc-badge { display: none !important; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 12px 0; }

  .nav-item:hover { color: #94A3B8; background: rgba(255,255,255,0.03); }
  .nav-item.active { color: #1D9E75; border-left-color: #1D9E75; background: rgba(29,158,117,0.06); }
  .card { background: #1E293B; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; }

  .ai-card { background: rgba(127,119,221,0.08); border: 1px solid rgba(127,119,221,0.2); border-radius: 12px; }
  .table-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
  .table-row:hover { background: rgba(255,255,255,0.025); }
  .flash-up { background: rgba(29,158,117,0.2) !important; transition: background 0.5s ease; }
  .flash-down { background: rgba(239,68,68,0.2) !important; transition: background 0.5s ease; }
  .price-flash { transition: background 0.5s ease; }
  .page { display: none; }
  .page.active { display: block; }
  .fullscreen-page { display: none; position: fixed; inset: 0; z-index: 200; }
  .fullscreen-page.active { display: flex; }
  .input-field { background: #0F172A; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #E2E8F0; font-family: 'Sarabun', sans-serif; font-size: 14px; width: 100%; outline: none; transition: border-color 0.15s; }
  .input-field:focus { border-color: #1D9E75; }
  .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: #64748B; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Sarabun', sans-serif; transition: all 0.15s; }
  .tab-btn.active { color: #1D9E75; border-bottom-color: #1D9E75; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1E293B; border: 1px solid rgba(29,158,117,0.4); border-radius: 10px; padding: 14px 20px; color: #E2E8F0; font-size: 14px; z-index: 9999; display: flex; align-items: center; gap-10px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #1E293B; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw; }
  .lang-pill { display: flex; background: #161618; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
  .lang-pill button { padding: 4px 12px; font-size: 12px; font-weight: 600; background: none; border: none; cursor: pointer; color: #64748B; font-family: 'Sarabun', sans-serif; transition: all 0.15s; }
  .lang-pill button.active { background: #1D9E75; color: white; border-radius: 20px; }
  .chat-bubble-ai { background: #1E293B; border-radius: 0 12px 12px 12px; padding: 12px 16px; max-width: 75%; font-size: 14px; line-height: 1.6; border: 1px solid rgba(255,255,255,0.07); }
  .chat-bubble-user { background: #1D9E75; border-radius: 12px 0 12px 12px; padding: 12px 16px; max-width: 75%; font-size: 14px; line-height: 1.6; color: white; }
  .chip { background: rgba(29,158,117,0.1); border: 1px solid rgba(29,158,117,0.25); color: #1D9E75; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.15s; }
  .chip:hover { background: rgba(29,158,117,0.2); }
  .donut { width: 180px; height: 180px; border-radius: 50%; background: conic-gradient(#1D9E75 0% 68%, #3B82F6 68% 86%, #64748B 86% 100%); position: relative; }
  .donut::after { content: ''; position: absolute; inset: 35px; background: #1E293B; border-radius: 50%; }
  .kyc-step { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; transition: all 0.3s; }
  .kyc-step.done { background: #1D9E75; color: white; }
  .kyc-step.current { background: #1E293B; color: #1D9E75; border: 2px solid #1D9E75; }
  .kyc-step.pending { background: #1E293B; color: #475569; border: 2px solid #334155; }
  .notif-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.15s; }
  .notif-row:hover { background: rgba(255,255,255,0.025); }
  .notif-row.unread { background: rgba(29,158,117,0.04); }
  .toggle-switch { position: relative; width: 40px; height: 22px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; border-radius: 22px; transition: .3s; }
  .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
  .toggle-switch input:checked + .slider { background: #1D9E75; }
  .toggle-switch input:checked + .slider::before { transform: translateX(18px); }
  .footer-demo { text-align: center; color: #475569; font-size: 11px; padding: 16px; border-top: 1px solid rgba(255,255,255,0.04); margin-top: 40px; }

  .step-line.done { background: #1D9E75; }
  .capture-box { background: #0D0D0F; border-radius: 12px; aspect-ratio: 16/9; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(255,255,255,0.1); }
  .selfie-box { background: #0D0D0F; border-radius: 50%; width: 240px; height: 240px; display: flex; align-items: center; justify-content: center; border: 3px dashed rgba(255,255,255,0.15); margin: 0 auto; }

<body>

<!-- TOAST -->
<div class="toast" id="toast">
  <span style="color:#1D9E75;margin-right:10px;">✓</span>
  <span id="toast-msg">Action completed</span>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;" id="modal-title">Confirm Order</h3>
    <div style="background:#0F172A;border-radius:10px;padding:16px;margin-bottom:16px;font-size:14px;line-height:2;" id="modal-body"></div>
    <div style="display:flex;gap:12px;">
      <button class="outline-btn" style="flex:1;" onclick="closeModal()">Cancel</button>
      <button class="teal-btn" style="flex:1;" id="modal-confirm-btn" onclick="confirmOrder()">Confirm</button>
    </div>
  </div>
</div>

<!-- LOGIN PAGE -->

        </div>
        <span style="font-size:22px;font-weight:700;color:#E2E8F0;">TradeFlow <span style="color:#1D9E75;">TH</span></span>
      </div>
      <p style="color:#475569;font-size:13px;margin-top:8px;">Thai Commodity Trading Platform</p>
    </div>
    <div class="login-card">
      <!-- Tab -->
      <div style="display:flex;background:#0F172A;border-radius:8px;padding:4px;margin-bottom:24px;">
        <button onclick="switchLoginTab('login')" id="tab-login" style="flex:1;padding:8px;border-radius:6px;border:none;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:#1D9E75;color:white;transition:all 0.2s;" data-lang-key="loginTab">Login</button>
        <button onclick="switchLoginTab('register')" id="tab-register" style="flex:1;padding:8px;border-radius:6px;border:none;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:none;color:#64748B;transition:all 0.2s;" data-lang-key="registerTab">Register</button>
      </div>
      <!-- Login form -->
      <div id="form-login">
        <div style="margin-bottom:16px;">
          <label style="font-size:13px;color:#94A3B8;display:block;margin-bottom:6px;" data-lang-key="email">Email</label>
          <input class="input-field" type="email" placeholder="trader@example.com" value="somchai@example.com">
        </div>
        <div style="margin-bottom:24px;">
          <label style="font-size:13px;color:#94A3B8;display:block;margin-bottom:6px;" data-lang-key="password">Password</label>
          <input class="input-field" type="password" value="••••••••">
        </div>
        <button class="teal-btn" style="width:100%;padding:13px;" onclick="enterApp()" data-lang-key="signIn">Sign in</button>
        <p style="text-align:center;color:#475569;font-size:12px;margin-top:16px;">Demo: any credentials work</p>
      </div>
      <!-- Register form -->
      <div id="form-register" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
          <div>
            <label style="font-size:13px;color:#94A3B8;display:block;margin-bottom:6px;" data-lang-key="fullName">Full Name</label>
            <input class="input-field" placeholder="Somchai Thongdee">
          </div>
          <div>
            <label style="font-size:13px;color:#94A3B8;display:block;margin-bottom:6px;" data-lang-key="phone">Phone</label>
            <input class="input-field" placeholder="+66 8x xxx xxxx">
          </div>
        </div>
        <div style="margin-bottom:14px;">
          <label style="font-size:13px;color:#94A3B8;display:block;margin-bottom:6px;" data-lang-key="email">Email</label>
          <input class="input-field" placeholder="email@example.com">
        </div>
        <div style="margin-bottom:24px;">
          <label style="font-size:13px;color:#94A3B8;display:block;margin-bottom:6px;" data-lang-key="password">Password</label>
          <input class="input-field" type="password" placeholder="Min. 8 characters">
        </div>
        <button class="teal-btn" style="width:100%;padding:13px;" onclick="startKYC()" data-lang-key="createAccount">Create Account</button>
      </div>
    </div>
    <p style="text-align:center;color:#334155;font-size:11px;margin-top:20px;">DEMO — Mocked Data Only</p>
  </div>
</div>

<!-- KYC FLOW -->
<div class="fullscreen-page" id="kyc-page" style="background:#0F172A;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:640px;">
    <!-- Step bar -->
    <div style="display:flex;align-items:center;margin-bottom:32px;" id="kyc-step-bar">
      <div class="kyc-step current" id="ks-1">1</div>
      <div class="step-line" id="sl-1"></div>
      <div class="kyc-step pending" id="ks-2">2</div>
      <div class="step-line" id="sl-2"></div>

      <div class="step-line" id="sl-3"></div>

    <div class="card" style="padding:32px;" id="kyc-content">

    <div style="display:flex;justify-content:flex-end;margin-top:20px;gap:12px;">

      <button class="teal-btn" id="kyc-next-btn" onclick="kycNext()" style="min-width:140px;">Continue →</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none;">
  <!-- SIDEBAR -->

    <nav style="padding:12px 0;flex:1;overflow-y:auto;" id="sidebar-nav">

    </nav>
    <div style="padding:16px;border-top:1px solid rgba(255,255,255,0.05);">

    <div class="topbar">

      <div style="position:relative;">
        <input class="input-field" style="width:240px;padding-left:36px;padding-right:12px;font-size:13px;" placeholder="Search assets..." id="search-box">

      <div class="lang-pill">
        <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
        <button id="lang-th" onclick="setLang('th')">TH</button>

    <!-- CONTENT PAGES -->
    <div class="content-area" id="content-area">
      <div class="page active" id="page-1"><!-- Dashboard --></div>
      <div class="page" id="page-2"><!-- Markets --></div>
      <div class="page" id="page-3"><!-- Asset Detail --></div>

      <div class="page" id="page-8"><!-- Profile --></div>
    </div>
  </div>
</div>

// ==================== SVG HELPERS ====================
function makeSparkline(data, color='#1D9E75', width=100, height=32){
  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*height}`).join(' ');
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="sparkline"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function makeChartSVG(data, width=600, height=220, color='#1D9E75'){
  const mn=Math.min(...data)-200, mx=Math.max(...data)+200, rng=mx-mn;
  const pad={l:60,r:20,t:20,b:30};
  const w=width-pad.l-pad.r, h=height-pad.t-pad.b;
  const pts=data.map((v,i)=>`${pad.l+(i/(data.length-1))*w},${pad.t+h-((v-mn)/rng)*h}`).join(' ');
  const first=pts.split(' ')[0], last=pts.split(' ')[pts.split(' ').length-1];
  const areaPath=`M ${first} L ${pts.split(' ').slice(1).join(' ')} L ${last.split(',')[0]},${pad.t+h} L ${pad.l},${pad.t+h} Z`;
  const yLabels = [0,0.25,0.5,0.75,1].map(pct=>({y:pad.t+h-pct*h,val:Math.round(mn+pct*rng)}));
  const xStep=Math.max(1,Math.floor(data.length/6));
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `<svg width="100%" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.25"/><stop offset="100%" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>
    ${yLabels.map(l=>`<line x1="${pad.l}" y1="${l.y}" x2="${width-pad.r}" y2="${l.y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><text x="${pad.l-8}" y="${l.y+4}" fill="#475569" font-size="11" text-anchor="end" font-family="IBM Plex Mono">฿${(l.val/1000).toFixed(0)}k</text>`).join('')}
    <path d="${areaPath}" fill="url(#areaGrad)"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((v,i)=>i%xStep===0?`<text x="${pad.l+(i/(data.length-1))*w}" y="${height-8}" fill="#475569" font-size="10" text-anchor="middle" font-family="IBM Plex Mono">${months[i%12]}</text>`:''  ).join('')}
    <circle cx="${pts.split(' ')[pts.split(' ').length-1].split(',')[0]}" cy="${pts.split(' ')[pts.split(' ').length-1].split(',')[1]}" r="4" fill="${color}" stroke="#1E293B" stroke-width="2"/>
  </svg>`;
}

function sendChat(){
  const inp=document.getElementById('chat-input');
  const msg=inp?inp.value.trim():'';
  if(!msg) return;
  chatHistory.push({role:'user',text:msg});
  const aiReply=aiResponses[msg]||`I've analyzed your query about "${msg}". Based on current market conditions, I recommend reviewing your risk parameters and consulting the latest market data. Would you like me to pull up a detailed analysis?`;

  renderAI();

}

// ==================== PRICE FLASH ====================
function startPriceFlash(){
  setInterval(()=>{
    const a=assets[Math.floor(Math.random()*assets.length)];
    const pct=(Math.random()*0.006-0.003);
    a.price=Math.round(a.price*(1+pct));
    a.change=parseFloat((a.change+pct*100*0.1).toFixed(2));
    a.changeThb=Math.round(a.changeThb+a.price*pct);
    // Update dashboard
    if(currentPage===1){
      // refresh movers
      const mv=document.querySelectorAll('#page-1 .table-row');
    }
    // Update markets table
    if(currentPage===2){
      const priceEl=document.getElementById('mprice-'+a.id);
      const pctEl=document.getElementById('mpct-'+a.id);
      const chgEl=document.getElementById('mchg-'+a.id);
      const row=document.getElementById('mrow-'+a.id);
      if(priceEl) priceEl.textContent='฿'+a.price.toLocaleString();
      if(pctEl){ pctEl.className=a.change>=0?'badge-green':'badge-red'; pctEl.textContent=(a.change>=0?'+':'')+a.change+'%'; }
      if(chgEl){ chgEl.style.color=a.changeThb>=0?'#22C55E':'#EF4444'; chgEl.textContent=(a.changeThb>=0?'+':'')+'฿'+Math.abs(a.changeThb); }
      if(row){
        row.classList.add(pct>0?'flash-up':'flash-down');
        setTimeout(()=>{ row.classList.remove('flash-up','flash-down'); },600);
      }
    }
  },4000);
}
